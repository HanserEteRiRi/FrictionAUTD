# FrictionAUTD playback configuration.
# 中文：这里放运行时默认参数，让命令行保持很短。
# English: Runtime defaults live here so the command line can stay short.

[paths]
# 中文：分析脚本生成的运动参数 JSON。
# English: Motion JSON generated by friction_analyze.py.
motion_json = "analysis/asmr_friction_01h22m01s_01h22m20s_friction_motion.json"

# 中文：留空时自动使用 JSON 里的 source_path。
# English: Leave empty to use source_path from the JSON.
audio_wav = ""

[playback]
# 中文：real 控制真实 AUTD；simulate 只在终端打印参数。
# English: real controls AUTD hardware; simulate prints parameters only.
mode = "real"

# 中文：从音频和 JSON 的哪个时间点开始。
# English: Start time in both audio and motion JSON.
start_s = 0.0

# 中文：0 表示播放到音频/JSON 结束。
# English: 0 means run until audio/JSON ends.
duration_s = 0.0

# 中文：每秒读取 JSON 并更新一次 AUTD 参数的次数。真实 AUTD 发送太频繁时会影响稳定性。
# English: How often JSON parameters are sampled and resent to AUTD.
update_hz = 4.0

# 中文：发送真实 AUTD 前先启动音频输出流，第一帧触觉发送成功后立刻播放声音。
# English: Pre-open audio output, then start audio immediately after the first haptic send.
sync_audio = true

[autd]
# 中文：设备连接、18 台几何和左右 9+9 分组完全使用 UltraSleep/config.py
#       与 UltraSleep/autd_manager.py 的 TwinCAT 配置。
# English: Link, 18-device geometry, and 9+9 grouping come from the copied
#          UltraSleep config.py and autd_manager.py TwinCAT setup.

# 中文：首选 STM 帧数；程序会自动微调帧数/采样分频以满足 AUTD 的 40 kHz 约束。
# English: Preferred STM frames; the program adjusts timing to satisfy AUTD's 40 kHz constraint.
preferred_frames = 96

# 中文：整体强度倍率。1.0 表示直接使用 JSON 里的 intensity。
# English: Global intensity multiplier. 1.0 uses JSON intensity directly.
intensity_scale = 1.0

# 中文：强度上限，真实 AUTD 最大为 255。
# English: Intensity cap; real AUTD maximum is 255.
max_intensity = 255

# 中文：连续发送失败达到该次数时停止，避免假装仍在同步。
# English: Stop after this many consecutive send failures.
max_consecutive_failures = 5

# 中文：分析 JSON 的 height_mm 原本是“单块 AUTD 平面上方高度”。在 UltraSleep
#       的环绕阵列中，用 base_z_mm + height_mm 得到全局 z；默认 250 + 100 = 350 mm。
# English: Global focus z is base_z_mm + the analyzed height_mm.
base_z_mm = 250.0

# 中文：左右 9 台设备各自控制一条同步摩擦轨迹。左侧坐标还会自动叠加
#       UltraSleep 的 DEVICE_CENTER_LEFT 偏移 [0, -184.4, 0]。
# English: Local centers for the synchronized right and left friction paths.
right_center_x_mm = 0.0
right_center_y_mm = 100.0
left_center_x_mm = 0.0
left_center_y_mm = -100.0

[audio]
# 中文：macOS 自动使用 afplay；TwinCAT/Windows 环境自动使用 sounddevice。
# English: Auto selects afplay on macOS and sounddevice in TwinCAT/Windows environments.
backend = "auto"

# 中文：音频输出设备。留空使用系统默认；也可以填 4 或设备名。
# 注意：afplay 使用系统默认输出设备；如果要指定设备，请把 backend 改成 "sounddevice"。
# English: Output device. Empty uses system default; can also be 4 or a device name.
# Note: afplay uses the system default output; use backend="sounddevice" to choose a device.
device = ""

# 中文：音量倍率，1.0 为原始音量。
# English: Audio gain multiplier; 1.0 is original volume.
volume = 1.0
